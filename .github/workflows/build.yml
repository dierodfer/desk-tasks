name: Build

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: Runner OS to build (or all)
        required: false
        type: choice
        options:
          - all
          - windows-latest
          - macos-latest
          - ubuntu-latest
        default: all

  workflow_call:
    inputs:
      target_os:
        required: false
        default: all
        type: string
      tag_name:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: ${{ inputs.target_os == 'all' || inputs.target_os == matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            make_target: build-windows-installer
          - os: macos-latest
            make_target: build-macos-universal
          - os: ubuntu-latest
            make_target: build-linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v6

      - name: Install make (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: choco install make -y

      - name: Install NSIS (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: choco install nsis -y

      - name: Verify NSIS (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles(x86)\NSIS",
            "$env:ProgramFiles\NSIS"
          )
          foreach ($path in $candidates) {
            if (Test-Path $path) {
              $path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            throw "makensis not found after NSIS installation"
          }
          makensis /VERSION

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Linux build dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Build
        run: make ${{ matrix.make_target }}
        shell: bash

      - name: Prepare artifact (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          mkdir -p dist
          cp build/bin/desk-tasks.exe dist/desk-tasks-windows-amd64.exe
          cp build/bin/desk-tasks-amd64-installer.exe dist/desk-tasks-windows-amd64-installer.exe
        shell: bash

      - name: Prepare artifact (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          cd build/bin
          mkdir -p ../../dist
          zip -r ../../dist/desk-tasks-macos-universal.zip desk-tasks.app
          cd ../..
        shell: bash

      - name: Prepare artifact (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          mkdir -p dist
          cp build/bin/desk-tasks dist/desk-tasks-linux-amd64
        shell: bash

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: desk-tasks-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

      - name: Upload Release Assets
        if: ${{ github.event_name == 'workflow_call' && inputs.tag_name != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: dist/*