name: Build

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: Runner OS to build
        required: true
        type: choice
        options:
          - windows-latest
          - macos-latest
          - ubuntu-latest
        default: ubuntu-latest

  workflow_call:
    inputs:
      target_os:
        required: true
        type: string
      tag_name:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ inputs.target_os }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v6

      - name: Install make (Windows)
        if: ${{ inputs.target_os == 'windows-latest' }}
        run: choco install make -y

      - name: Install NSIS (Windows)
        if: ${{ inputs.target_os == 'windows-latest' }}
        run: choco install nsis -y

      - name: Verify NSIS (Windows)
        if: ${{ inputs.target_os == 'windows-latest' }}
        shell: pwsh
        run: |
          $makensis = @(
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "${env:ProgramFiles}\NSIS\makensis.exe",
            "${env:ChocolateyInstall}\bin\makensis.exe"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1

          if (-not $makensis) {
            throw "makensis not found after NSIS installation"
          }

          $makensisDir = Split-Path -Parent $makensis
          $makensisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$makensisDir;$env:PATH"

          & $makensis /VERSION

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Linux build dependencies
        if: ${{ inputs.target_os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Build
        run: |
          set -euo pipefail
          case "${{ inputs.target_os }}" in
            windows-latest)
              make build-windows-installer
              ;;
            macos-latest)
              make build-macos-universal
              ;;
            ubuntu-latest)
              make build-linux-amd64
              ;;
            *)
              echo "Unsupported target_os: ${{ inputs.target_os }}"
              exit 1
              ;;
          esac
        shell: bash

      - name: Prepare artifact (Windows)
        if: ${{ inputs.target_os == 'windows-latest' }}
        run: |
          mkdir -p dist
          cp build/bin/desk-tasks.exe dist/desk-tasks-windows-amd64.exe
          cp build/bin/desk-tasks-amd64-installer.exe dist/desk-tasks-windows-amd64-installer.exe
        shell: bash

      - name: Prepare artifact (macOS)
        if: ${{ inputs.target_os == 'macos-latest' }}
        run: |
          cd build/bin
          mkdir -p ../../dist
          zip -r ../../dist/desk-tasks-macos-universal.zip desk-tasks.app
          cd ../..
        shell: bash

      - name: Prepare artifact (Linux)
        if: ${{ inputs.target_os == 'ubuntu-latest' }}
        run: |
          mkdir -p dist
          cp build/bin/desk-tasks dist/desk-tasks-linux-amd64
        shell: bash

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: desk-tasks-${{ inputs.target_os }}
          path: dist/*
          if-no-files-found: error

      - name: Upload Release Assets
        if: ${{ github.event_name == 'workflow_call' && inputs.tag_name != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: dist/*