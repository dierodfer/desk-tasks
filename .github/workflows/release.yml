name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync-version:
    name: 'Sync version files'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update version files
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          make version-set NEW_VERSION="$VERSION"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: sync version to ${{ github.event.release.tag_name }}"
          file_pattern: "VERSION"

  build:
    name: Build and publish (${{ matrix.target_os }})
    needs: sync-version
    strategy:
      fail-fast: false
      matrix:
        target_os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    uses: ./.github/workflows/build.yml
    with:
      target_os: ${{ matrix.target_os }}
      tag_name: ${{ github.event.release.tag_name }}
    permissions:
      contents: write
