name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-checks:
    name: Go compatibility & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Prepare embedded frontend assets for static analysis
        run: |
          mkdir -p frontend/dist
          if [ ! -f frontend/dist/index.html ]; then
            printf '%s\n' '<!doctype html><title>placeholder</title>' > frontend/dist/index.html
          fi

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -count=1 ./...

  frontend-checks:
    name: Frontend install & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: TypeScript type-check
        run: npx tsc --noEmit

  build-smoke:
    name: Build smoke test (Windows cross-compile)
    needs: [go-checks, frontend-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build (Windows cross-compile)
        run: make build-windows
